<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Silensia: New neural Mastery Labs and dashboards are launching soon." />
  <title>Silensia — Next Sequence Loading</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/coming-soon.css" />
</head>
<body>

  <main class="coming-soon-wrapper">
    <!-- Atmospheric Blobs -->
    <div class="cs-bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- TOP NAV CONTROLS -->
    <div class="auth-controls">
        <a href="../index.html" class="auth-back-home" aria-label="Go back to home">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            <span>Home</span>
        </a>
        
        


        <button class="theme-toggle" id="cs-theme-toggle" aria-label="Toggle theme"></button>
    </div>

    <!-- Content -->
    <div class="cs-content">
        <a href="../index.html" class="cs-brand-stack" style="text-decoration: none;">
            <div class="auth-logo">
                <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="36" height="36" rx="10" fill="var(--color-primary)"/>
                    <circle cx="18" cy="18" r="8" stroke="white" stroke-width="2"/>
                    <circle cx="18" cy="18" r="3" fill="white"/>
                </svg>
            </div>
            <span class="auth-brand-name">Silensia</span>
        </a>
        <span class="cs-tag">Next Sequence Loading</span>

        <h1>Expanding the <span class="text-gradient">Neural Horizon.</span></h1>

        
        <!-- Countdown -->
        <div class="countdown-container">
            <div class="cd-box">
                <span class="cd-num" id="days">00</span>
                <span class="cd-label">Days</span>
            </div>
            <div class="cd-box">
                <span class="cd-num" id="hours">00</span>
                <span class="cd-label">Hours</span>
            </div>
            <div class="cd-box">
                <span class="cd-num" id="minutes">00</span>
                <span class="cd-label">Mins</span>
            </div>
            <div class="cd-box">
                <span class="cd-num" id="seconds">00</span>
                <span class="cd-label">Secs</span>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="alignment-progress">
            <div class="progress-label">
                <span>Alignment Status</span>
                <span>88%</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill"></div>
            </div>
        </div>

        <!-- Form -->
        <form class="waitlist-form">
            <input type="email" placeholder="Your neural identifier (email)" required>
            <button type="submit" class="btn-filled">Join Waitlist</button>
        </form>

        <p style="margin-top: 40px; color: var(--color-text-secondary); font-size: 14px;">We'll transmit the update directly to your frequency.</p>
    </div>

  </main>

  <script src="../js/global.js"></script>
  <script src="../js/coming-soon.js"></script>
</body>
</html>
