<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Silensia Error 404: Neural signal lost. The frequency you requested is not available." />
  <title>404 — Frequency Lost | Silensia</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/404.css" />

  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
</head>
<body class="error-page-body">

  <main class="error-page-wrapper">
    <!-- Fragmented Blobs -->
    <div class="error-bg-blobs">
        <div class="fragment frag-1"></div>
        <div class="fragment frag-2"></div>
        <div class="fragment frag-3"></div>
    </div>

    <!-- TOP NAV CONTROLS -->
    <div class="auth-controls">
        <a href="../index.html" class="auth-back-home" aria-label="Go back to home">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            <span>Home</span>
        </a>
        


        <button class="theme-toggle" id="error-theme-toggle" aria-label="Toggle theme"></button>
    </div>

    <!-- Error Content -->
    <div class="error-content">
        <a href="../index.html" class="error-brand-stack" style="text-decoration: none;">
            <div class="auth-logo">
                <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="36" height="36" rx="10" fill="var(--color-primary)"/>
                    <circle cx="18" cy="18" r="8" stroke="white" stroke-width="2"/>
                    <circle cx="18" cy="18" r="3" fill="white"/>
                </svg>
            </div>
            <span class="auth-brand-name">Silensia</span>
        </a>
        
        <div class="error-code">404</div>
        <h1>Frequency De-synchronized</h1>

        <p>The neural pathway you requested does not exist or has been shifted into an inaccessible frequency. Return to the origin for re-calibration.</p>
        
        <a href="../index.html" class="btn-filled" style="padding: 18px 40px; min-width: 200px;">Return to Origin</a>
    </div>

  </main>

  <script src="../js/global.js"></script>
</body>
</html>
