<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Access your Silensia neural dashboard. Sign in or create a new account." />
  <title>Silensia — Authenticate</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
</head>
<body class="auth-page">

  <!-- TOP NAV CONTROLS -->
  <div class="auth-controls" style="justify-content: flex-end; gap: 12px;">
    <button class="rtl-toggle" id="auth-rtl-toggle" aria-label="Switch to RTL"></button>
    <button class="theme-toggle" id="auth-theme-toggle" aria-label="Toggle theme"></button>
  </div>

  <!-- Neural Background Glows -->
  <div class="auth-bg-glow glow-1"></div>
  <div class="auth-bg-glow glow-2"></div>

  <!-- AUTH CARD -->
  <main class="auth-card" id="auth-card">
    
    <div class="auth-header">
      <a href="../index.html" class="auth-logo-wrapper" style="text-decoration: none;">
        <div class="auth-logo">
           <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="36" height="36" rx="10" fill="var(--color-brand)"/>
              <circle cx="18" cy="18" r="8" stroke="white" stroke-width="2"/>
              <circle cx="18" cy="18" r="3" fill="white"/>
           </svg>
        </div>
        <span class="auth-brand-name">Silensia</span>
      </a>
      <h1 id="auth-title">Welcome Back</h1>
      <p id="auth-desc">Enter your credentials to access your account</p>
    </div>

    <!-- FORM -->
    <form class="auth-form" id="auth-form-internal">
      
      <!-- Signup Only: Full Name -->
      <div class="auth-group signup-only">
        <label for="reg-name">Full Name</label>
        <div class="auth-input-wrapper">
          <input type="text" id="reg-name" placeholder="John Doe">
        </div>
      </div>

      <div class="auth-group">
        <label for="auth-email">Email Address</label>
        <div class="auth-input-wrapper">
          <input type="email" id="auth-email" placeholder="name@email.com" required>
        </div>
      </div>

      <div class="auth-group">
        <label for="auth-password">Password</label>
        <div class="auth-input-wrapper">
          <input type="password" id="auth-password" placeholder="••••••••" required>
          <span class="pw-toggle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </span>
        </div>
      </div>

      <!-- Login Only: Remember & Forgot -->
      <div class="auth-options login-only">
        <label class="auth-remember">
          <input type="checkbox">
          <span>Remember Me</span>
        </label>
        <a href="#" class="auth-forgot">Forgot Password?</a>
      </div>

      <!-- Signup Only: Terms -->
      <div class="auth-options signup-only">
        <label class="auth-remember">
          <input type="checkbox" required>
          <span>I agree to the <a href="#" style="text-decoration: underline;">Terms</a> and <a href="#" style="text-decoration: underline;">Privacy</a></span>
        </label>
      </div>

      <button type="submit" class="btn-filled" id="auth-submit-btn" style="width: 100%; height: 50px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">Sign In</button>

    </form>

    <div class="auth-divider">
      <span>Or continue with</span>
    </div>

    <div class="social-grid">
      <button class="btn-social">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google
      </button>
      <button class="btn-social">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-.6-.28-1.2-.46-2.1-.46s-1.5.18-2.1.45c-.95.45-1.9.58-2.85-.35C3.35 15.65 4.3 8.2 8.7 7.9c1.1 0 1.85.5 2.55.5s1.65-.6 3-.5c1.45.1 2.65.65 3.35 1.6-2.85 1.65-2.4 5.35.5 6.5-.6 1.6-1.4 3.25-2.05 4.28zM12.1 7.26c-.1 0-.15 0-.25-.05.1-1.3.65-2.6 1.6-3.55.9-.9 2.25-1.45 3.5-1.45.1 1.45-.55 2.75-1.55 3.75-.8.8-2.1 1.3-3.3 1.3z"/></svg>
        Apple
      </button>
    </div>

    <div class="auth-footer">
      <p class="login-only">Don't have an account? <span class="toggle-auth">Join now</span></p>
      <p class="signup-only">Already have an account? <span class="toggle-auth">Log in</span></p>
    </div>

  </main>

  <!-- Scripts -->
  <script src="../js/global.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
